---

- name: Administration > Logging
  ansible.builtin.shell: "{{ lookup('template', '{{ logging_nvram }}') }}"
  args: 
    executable: /bin/sh

- name: Commit Administration > Logging changes and restart 'logging' service
  ansible.builtin.shell: |
    nvram commit
    service logging restart
  args: 
    executable: /bin/sh
