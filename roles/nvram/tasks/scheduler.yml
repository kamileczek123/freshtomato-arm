---

# `backup` tasks require `scheduler` before

- name: Administration > Scheduler
  ansible.builtin.shell: "{{ lookup('template', scheduler_nvram) }}"
  args: 
    executable: /bin/sh

- name: Commit Administration > Scheduler changes and restart 'sched' service
  ansible.builtin.shell: |
    nvram commit
    service sched restart
  args: 
    executable: /bin/sh
