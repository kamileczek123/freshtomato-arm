---

- name: Port Forwarding > Basic
  ansible.builtin.shell: "{{ lookup('template', '{{ pf_basic_nvram }}') }}"
  args: 
    executable: /bin/sh

- name: Commit Port Forwarding > Basic changes and restart 'firewall' service
  ansible.builtin.shell: |
    nvram commit
    service firewall restart
  args: 
    executable: /bin/sh

